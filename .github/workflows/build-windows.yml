name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Generate embedded secrets
      shell: bash
      env:
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
      run: |
        python - <<'PYEOF'
        import os, json
        sheet = os.environ.get('GOOGLE_SHEET_ID', '')
        cred = os.environ.get('GSPREAD_CREDENTIALS', '{}')
        try:
            d = json.loads(cred)
        except Exception:
            d = {}
        with open('src/embedded_credentials.py', 'w', encoding='utf-8') as f:
            f.write("SECRETS = {\n")
            f.write(f'    "GOOGLE_SHEET_ID": {repr(sheet)},\n')
            f.write(f'    "CREDENTIALS_DICT": {repr(d)}\n')
            f.write("}\n")
        print("embedded_credentials.py generated OK")
        PYEOF

    - name: Prepare default config.json
      shell: bash
      run: |
        echo "{}" > config.json

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed `
          --name "NamcoBot" `
          --add-data "src;src" `
          --add-data "config.json;." `
          --hidden-import=_socket `
          --hidden-import=socket `
          --hidden-import=multiprocessing `
          --hidden-import=multiprocessing.reduction `
          --hidden-import=multiprocessing.context `
          --hidden-import=multiprocessing.popen_spawn_win32 `
          --hidden-import=multiprocessing.synchronize `
          --hidden-import=playwright `
          --hidden-import=playwright.async_api `
          --hidden-import=playwright.sync_api `
          --hidden-import=openpyxl `
          --hidden-import=openpyxl.cell._writer `
          --hidden-import=openpyxl.styles `
          --hidden-import=openpyxl.styles.fonts `
          --hidden-import=openpyxl.styles.fills `
          --hidden-import=openpyxl.styles.alignment `
          --hidden-import=openpyxl.utils `
          --hidden-import=requests `
          --hidden-import=urllib3 `
          --hidden-import=urllib3.exceptions `
          --hidden-import=dateutil `
          --hidden-import=dateutil.parser `
          --hidden-import=colorlog `
          --hidden-import=dotenv `
          --hidden-import=pycparser `
          --hidden-import=cffi `
          --hidden-import=cryptography `
          --collect-all playwright `
          --collect-all openpyxl `
          gui.py


    - name: Create data directory
      shell: bash
      run: mkdir -p dist/NamcoBot/data

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NamcoBot-Windows-Release
        path: dist/NamcoBot/
        retention-days: 14
